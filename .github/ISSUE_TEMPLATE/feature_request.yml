name: Feature request
description: Proponha uma melhoria de produto ou engenharia
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema ou oportunidade
      description: Qual dor essa ideia resolve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
      description: Como você imagina a solução?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Observações adicionais

